name: "Build iOS IPA"

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: '3.19.0' # On fixe une version stable

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (No Sign)
        run: |
          flutter build ios --release --no-codesign --no-verbose
          mkdir -p build/ios/iphoneos/Payload
          mv build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          cd build/ios/iphoneos
          zip -r iphone-transfer.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iphone-transfer-app
          path: build/ios/iphoneos/iphone-transfer.ipa
