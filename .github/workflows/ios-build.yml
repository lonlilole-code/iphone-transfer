name: "Build iOS IPA"

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create iOS configuration
        run: flutter create . --platforms=ios

      - name: Get dependencies
        run: flutter pub get

      - name: Build IPA (Official Method)
        run: |
          flutter build ios --release --no-codesign
          # Création propre de l'IPA sans passer par un zip manuel capricieux
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r iphone-transfer.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iphone-transfer-app
          path: iphone-transfer.ipa
